{% extends "base.html" %}
{% block content %}
<h2>Export</h2>
<p class="hint">
<a href="?fmt=sms">SMS</a> | <a href="?fmt=text">Text</a>
</p>
<hr/>
{% for num, chunk, link in chunks %}
<div class="list-item">
<strong>{{ num }}.</strong> {{ chunk|truncatechars:100 }}
{% if format == 'sms' %}<br/><a href="{{ link }}">Send SMS</a>{% endif %}
</div>
{% empty %}
<p class="hint">No messages to export.</p>
{% endfor %}
<p><a href="{% url 'chat:chat' %}">[Back]</a></p>
{% endblock %}
