{% extends "base.html" %}
{% block content %}
<p class="hint">Type number to use, "n" for new:</p>
<form method="post">
{% csrf_token %}
<input type="text" name="choice" inputmode="numeric" autofocus="autofocus" style="width:50px"/>
<input type="submit" value="Go"/>
</form>
<hr/>
{% for num, p in personas %}
<div class="list-item">
<strong>{{ num }}.</strong> {{ p.name }}{% if p.is_default %} *{% endif %}
<a href="{% url 'personas:edit' p.pk %}">E</a>
<a href="{% url 'personas:delete' p.pk %}">D</a>
</div>
{% empty %}
<p class="hint">No personas.</p>
{% endfor %}
{% endblock %}
