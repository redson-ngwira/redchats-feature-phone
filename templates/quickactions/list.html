{% extends "base.html" %}
{% block content %}
<h2>Quick Actions</h2>
<p class="hint">In chat, type: number + space + text<br/>e.g. "1 photosynthesis" = Explain</p>
<p class="hint">Type number to edit:</p>
<form method="post">
{% csrf_token %}
<input type="text" name="choice" inputmode="numeric" autofocus="autofocus" style="width:50px"/>
<input type="submit" value="Edit"/>
</form>
<hr/>
{% for num, a in actions %}
<div class="list-item">
<strong>{{ num }}.</strong> {{ a.label }}
<span class="hint">- {{ a.prompt_template|truncatechars:35 }}</span>
</div>
{% endfor %}
{% endblock %}
