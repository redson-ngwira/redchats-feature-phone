{% extends "base.html" %}
{% block content %}
<p class="hint">In chat: key + space + text<br/>e.g. "1 sun" = Explain sun</p>
<form method="post">
{% csrf_token %}
<input type="text" name="choice" inputmode="numeric" autofocus="autofocus" style="width:50px"/>
<input type="submit" value="Edit"/>
</form>
<hr/>
{% for num, a in actions %}
<div class="list-item">
<strong>{{ num }}.</strong> {{ a.label }}
</div>
{% endfor %}
{% endblock %}
